security:
    providers:
        keycloak_provider:
            entity:
                class: App\Entity\User
                property: keycloakId

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            custom_authenticators:
                - App\Security\KeycloakAuthenticator

    access_control:
        - { path: ^/api/dev/auth,    roles: PUBLIC_ACCESS }
        - { path: ^/api/docs,        roles: PUBLIC_ACCESS }
        - { path: ^/api/formats,     roles: PUBLIC_ACCESS }
        - { path: ^/api/decks/public, roles: PUBLIC_ACCESS }
        - { path: '^/api/decks/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', roles: PUBLIC_ACCESS }
        - { path: '^/api/bga/decks/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', roles: PUBLIC_ACCESS }
        - { path: ^/api/admin,    roles: ROLE_ADMIN }
        - { path: ^/api,          roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
